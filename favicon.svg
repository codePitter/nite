<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Outer glow -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a1508"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!-- Gold shimmer on the star -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffe88a"/>
      <stop offset="45%"  stop-color="#c8922a"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </radialGradient>

    <!-- Diffuse glow filter -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tight sharp glow -->
    <filter id="glowTight" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)" stroke="#2a1f08" stroke-width="0.6"/>

  <!-- Subtle inner ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#b8954a" stroke-width="0.3" opacity="0.25"/>

  <!-- Ambient gold halo behind star -->
  <circle cx="16" cy="16" r="7" fill="#b8701a" opacity="0.12" filter="url(#glow)"/>

  <!-- ✦ four-pointed star — drawn as path for crisp render -->
  <!-- Points: top, right, bottom, left with slim waist -->
  <path d="
    M16 5.5
    C16.15 10.2 11.6 11.6 6.8 11.85
    C11.55 12.1 16.05 16.5 16 21.2
    C15.95 16.5 20.45 12.1 25.2 11.85
    C20.4 11.6 15.85 10.2 16 5.5Z
  "
    fill="url(#goldGlow)"
    filter="url(#glow)"
  />

  <!-- Same path again, unfiltered on top for sharp edge -->
  <path d="
    M16 5.5
    C16.15 10.2 11.6 11.6 6.8 11.85
    C11.55 12.1 16.05 16.5 16 21.2
    C15.95 16.5 20.45 12.1 25.2 11.85
    C20.4 11.6 15.85 10.2 16 5.5Z
  "
    fill="url(#goldGlow)"
    filter="url(#glowTight)"
  />

  <!-- Bright center sparkle -->
  <circle cx="16" cy="11.85" r="1.1" fill="#fff8d0" opacity="0.85" filter="url(#glowTight)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 207" width="200" height="207">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1508"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe88a"/>
      <stop offset="45%" stop-color="#c8922a"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowTight" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="97" fill="url(#bg)" stroke="#2a1f08" stroke-width="3" style="stroke:rgb(42, 31, 8);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#b8954a" stroke-width="1.5" opacity="0.25" style="fill:none;stroke:rgb(184, 149, 74);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="100" cy="100" r="44" fill="#b8701a" opacity="0.12" filter="url(#glow)" style="fill:rgb(184, 112, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ✦ four-pointed star scaled to 200x200 -->
  <path d="&#10;    M100 34&#10;    C100.9 64 72.5 72.5 42.5 74.1&#10;    C72.2 75.6 100.3 103 100 133&#10;    C99.7 103 127.8 75.6 157.5 74.1&#10;    C127.5 72.5 99.1 64 100 34Z&#10;  " fill="url(#goldGlow)" filter="url(#glow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="&#10;    M100 34&#10;    C100.9 64 72.5 72.5 42.5 74.1&#10;    C72.2 75.6 100.3 103 100 133&#10;    C99.7 103 127.8 75.6 157.5 74.1&#10;    C127.5 72.5 99.1 64 100 34Z&#10;  " fill="url(#goldGlow)" filter="url(#glowTight)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Sparkle center -->
  <circle cx="100" cy="74" r="7" fill="#fff8d0" opacity="0.9" filter="url(#glowTight)" style="fill:rgb(255, 248, 208);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Label -->
  <text x="100" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b8954a" letter-spacing="3" opacity="0.6" style="fill:rgb(184, 149, 74);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:Georgia, serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">NITE BY LIS</text>
</svg>